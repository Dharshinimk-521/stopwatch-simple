<!DOCTYPE html>
<html>
    <head>
       <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>STOPWATCH</title>
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=Bitcount+Single:wght@100..900&family=Cedarville+Cursive&family=Edu+NSW+ACT+Cursive:wght@400..700&family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=Iosevka+Charon:ital,wght@0,300;0,400;0,500;0,700;1,300;1,400;1,500;1,700&family=Open+Sans:ital,wght@0,300..800;1,300..800&family=Oswald:wght@200..700&family=Roboto+Mono:ital,wght@0,100..700;1,100..700&family=Roboto:ital,wght@0,500;1,500&family=Saira+Stencil:ital,wght@0,100..900;1,100..900&family=Sekuya&family=Share+Tech&display=swap" rel="stylesheet">
        <link rel="stylesheet" href="style.css">
        <script src="stopwatch.js" defer></script> 
    </head>
    <body>
        <h1 class="title"> STOP WATCH</h1>
        <p>This can be used to measure time to do an event.</p>
        <div class="time-template">

            <h1 id="time">00:00:00</h1>
            <button id="start">Start</button>
            <button id="stop">Stop</button>
            <button id="reset">Reset</button>
        </div>
    </body>
</html>
